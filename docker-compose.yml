# WashPro — Docker Compose (local & VPS production)
#
# Usage:
#   cp .env.example .env   # isi JWT_SECRET, SUPERADMIN_JWT_SECRET, FRONTEND_URL (HTTPS di VPS)
#   docker compose up --build -d
#
# Lokal:  http://localhost:8080  →  /api proxied via nginx
# VPS:    reverse proxy (Caddy/Nginx) → 127.0.0.1:8080, set FRONTEND_URL=https://domain.com
# MySQL:  hanya localhost (127.0.0.1:3306), tidak expose ke internet

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-washpro}
      MYSQL_USER: ${MYSQL_USER:-washpro}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-washpro}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_BIND:-127.0.0.1}:${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-washpro}:${MYSQL_PASSWORD:-washpro}@db:3306/${MYSQL_DATABASE:-washpro}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SUPERADMIN_JWT_SECRET: ${SUPERADMIN_JWT_SECRET:?SUPERADMIN_JWT_SECRET is required}
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      GOWA_ENABLED: ${GOWA_ENABLED:-false}
      GOWA_API_URL: ${GOWA_API_URL:-http://host.docker.internal:3000/}
      GOWA_USERNAME: ${GOWA_USERNAME:-admin}
      GOWA_PASSWORD: ${GOWA_PASSWORD:-admin}
      QRIS_STATIC_PAYLOAD: ${QRIS_STATIC_PAYLOAD:-}
      QRIS_MERCHANT_NAME: ${QRIS_MERCHANT_NAME:-WashPro}
      QRIS_MERCHANT_BANK: ${QRIS_MERCHANT_BANK:-QRIS}
      SUPERADMIN_PHONE: ${SUPERADMIN_PHONE:-}
    volumes:
      - uploads:/app/backend/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads:
